{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Faro del Viajero{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Tipografía Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- CSS propio -->
    <link rel="stylesheet" href="{% static 'core/css/styles.css' %}">
</head>
<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-faro sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img src="{% static 'core/img/logo.png' %}" alt="Logo" width="32" height="32" class="d-inline-block align-text-top">
                Faro del Viajero
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav align-items-center">
                    <li class="nav-item">
                        <!-- Botón secundario para registrarse -->
                        <a class="btn btn-secondary" href="/autenticado/registro/">Registrarte</a>
                    </li>
                    <li class="nav-item ms-2">
                        <!-- Botón primario para iniciar sesión -->
                        <a class="btn btn-primary" href="/autenticado/login/">Iniciar sesión</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <div class="flex-shrink-0 container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <!-- Footer -->
    <footer class="footer mt-auto py-4">
        <div class="container text-center">
            <span class="text-secondary-custom small">&copy; 2026 ESCOM - Proyecto Faro del Viajero</span>
            <div class="mt-1">
                <a href="#" class="text-decoration-none text-secondary-custom small">Términos y condiciones</a>
            </div>
        </div>
    </footer>

    <!-- JS Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
