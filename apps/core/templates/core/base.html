<!DOCTYPE html>
{% load static %}
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Faro del Viajero{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --turquesa: #0E9E8E;
            --turquesa-oscuro: #0b8a7c;
            --dorado: #F5C518;
            --naranja: #E8721C;
            --texto-limpio: #1A2E35; 
            --fondo-gris: #F2F2F0;
        }

        body { 
            background-color: var(--fondo-gris); 
            color: var(--texto-limpio); 
            font-family: 'Montserrat', sans-serif; 
            padding-top: 100px; 
        }

        .bg-turquesa { background-color: var(--turquesa) !important; }
        .text-limpio { color: var(--texto-limpio) !important; }
        .text-turquesa { color: var(--turquesa) !important; }

        .nav-link-custom {
            color: white; font-weight: 600; font-size: 14px; padding: 8px 16px; border-radius: 20px; transition: all 0.2s;
        }
        .nav-link-custom:hover { background-color: rgba(255, 255, 255, 0.1); color: white; }
        .nav-link-custom.active { background-color: rgba(255, 255, 255, 0.25); color: white; }
        
        .search-bar-nav {
            background-color: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255,255,255,0.4); 
            border-radius: 20px; padding: 8px 18px; 
            color: white; width: 240px; font-size: 14px;
        }
        .search-bar-nav::placeholder { color: rgba(255, 255, 255, 0.8); }
        .search-bar-nav:focus { outline: none; background-color: rgba(255, 255, 255, 0.3); border-color: white; }

        .icon-btn-nav {
            background-color: rgba(255, 255, 255, 0.2); border-radius: 50%; width: 42px; height: 42px; 
            display: flex; justify-content: center; align-items: center; color: white; cursor: pointer; transition: background 0.2s;
        }
        .icon-btn-nav:hover { background-color: rgba(255, 255, 255, 0.3); }

        .btn-naranja {
            background-color: var(--naranja); color: white; border: none; font-weight: 700; transition: all 0.2s ease;
        }
        .btn-naranja:hover { background-color: #d66415; color: white; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(232, 114, 28, 0.2); }
    </style>
</head>
<body>

    {% block navbar %}
    <nav class="navbar fixed-top bg-turquesa shadow-sm py-3" id="mainNav">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            
            <a href="{% url 'home' %}" class="text-decoration-none d-flex align-items-center me-4">
                <img src="{% static 'core/img/logo.png' %}" alt="Logo Faro del Viajero" width="48" height="48" class="me-3 rounded shadow-sm" style="object-fit: cover;">
                <h2 class="mb-0 fw-bold text-white" style="letter-spacing: 0.5px; font-size: 1.6rem;">Faro del Viajero</h2>
            </a>

            {% if user.is_authenticated %}
                <div class="d-none d-lg-flex align-items-center gap-2 me-auto">
                    <a href="#" class="text-decoration-none nav-link-custom active">Mis viajes</a>
                    <a href="#" class="text-decoration-none nav-link-custom">Buscar destinos</a>
                </div>

                <div class="d-flex align-items-center gap-3">
                    <div class="position-relative d-none d-md-block">
                        <svg class="position-absolute" style="top: 10px; left: 14px; color: white;" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                        <input type="text" class="search-bar-nav" style="padding-left: 40px;" placeholder="Buscar">
                    </div>
                    <div class="icon-btn-nav">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
                    </div>
                    <a href="{% url 'profile' %}" class="icon-btn-nav text-decoration-none">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </a>
                </div>

            {% else %}

            <div class="d-flex align-items-center gap-2">
                {% block nav_auth %}
            <a href="{% url 'login' %}" 
               class="btn fw-bold rounded-pill px-4 py-2 {% if request.resolver_match.url_name == 'login' %}btn-naranja{% else %}text-white{% endif %}" 
               style="font-size: 1.05rem; transition: all 0.3s;">
                Iniciar sesión
            </a>

            <a href="{% url 'register' %}" 
               class="btn fw-bold rounded-pill px-4 py-2 {% if request.resolver_match.url_name == 'register' %}btn-naranja{% else %}text-white{% endif %}" 
               style="font-size: 1.05rem; transition: all 0.3s;">
                Registrarte
            </a>
        {% endblock %}
    </div>
            {% endif %}

        </div>
    </nav>
    {% endblock %}

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
