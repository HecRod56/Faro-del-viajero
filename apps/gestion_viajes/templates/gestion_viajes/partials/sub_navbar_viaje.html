<!-- sub_navbar_viaje.html -->
<style>
    /* Estilos del diseño de Actividades */
    .trip-subnav { background-color: white; border-bottom: 1px solid #E4E4E2; position: sticky; top: 70px; z-index: 1030; }
    .breadcrumb-item + .breadcrumb-item::before {content: ">";}
    .breadcrumb-item a { color: #9CA3AF; font-weight: 600; text-decoration: none; transition: color 0.2s ease; }
    .breadcrumb-item.active { color: #0E9E8E; font-weight: 700; }
    .breadcrumb-item a:hover { color: #1e293b; text-decoration: underline; }    
    .nav-tabs-custom { border-bottom: none; gap: 20px; display: flex; padding: 0; list-style: none; margin-bottom: 0; }
    .nav-tabs-custom .nav-link {
        color: #888; font-weight: 600; padding: 12px 0; font-size: 15px;
        border-bottom: 3px solid transparent; transition: all 0.2s; text-decoration: none; cursor: pointer;
    }
    .nav-tabs-custom .nav-link:hover { color: #0E9E8E; }
    .nav-tabs-custom .nav-link.active { color: #0E9E8E; border-bottom-color: #0E9E8E; font-weight: 700; }
    .integrantes-badge { background-color: #EBFBFA; color: #0E9E8E; border-radius: 999px; padding: 2px 8px; font-size: 12px; font-weight: 700; margin-left: 5px; }
</style>

{% if viaje %}
<div class="trip-subnav pt-3 pb-0 shadow-sm">
    <div class="container-fluid">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-2" style="font-size: 13px;">
                <li class="breadcrumb-item"><a href="{% url 'gestion_viajes:p_ver_mis_viajes' %}">Mis Viajes</a></li>
                <li class="breadcrumb-item active">{{ viaje.nombre }}</li>
            </ol>
        </nav>
        <ul class="nav nav-tabs-custom">
            <li><a href="{% url 'gestion_viajes:p_detalle_viaje' viaje.id %}" class="nav-link {% if request.resolver_match.url_name == 'p_detalle_viaje' %}active{% endif %}">Resumen</a></li>
            <li><a href="{% url 'actividades:lista' viaje.id %}" class="nav-link {% if request.resolver_match.namespace == 'actividades' %}active{% endif %}">Actividades</a></li>
            <li><a href="{% url 'busqueda:p_destinos' viaje.id %}" class="nav-link {% if request.resolver_match.namespace == 'busqueda' %}active{% endif %}">Destinos</a></li>
            <li><a href="{% url 'transporte:principal' viaje.id %}" class="nav-link {% if request.resolver_match.namespace == 'transporte' %}active{% endif %}">Transporte</a></li>              
            <li><a href="{% url 'gastos:resumen' viaje.id %}"class="nav-link {% if request.resolver_match.namespace == 'gastos' %}active{% endif %}">Gastos</a></li>
            <li><a href="{% url 'chat:chat_viaje' viaje.id %}" class="nav-link {% if request.resolver_match.url_name == 'chat_viaje' %}active{% endif %}">Chat</a></li>
            <li><a href="{% url 'galeria:ver_galeria' id_viaje=viaje.id %}" class="nav-link">Galería</a></li>
            <li>
                <a href="{% url 'integrantes:lista' id_viaje=viaje.id %}" class="nav-link">
                    Integrantes <span class="integrantes-badge">{{ viaje.participantes.count }}</span>
                </a>
            </li>
        </ul>
    </div>
</div>
{% endif %}
