<style>
    /* ── Sub-Navbar Viaje ── */
    .sub-navbar-viaje {
        background-color: #fff;
        border-bottom: 1px solid #E5E7EB;
        padding: 1rem 1.5rem 0 1.5rem;
        position: sticky;
        top: 80px;
        z-index: 40;
        display: flex;
        flex-direction: column;
        /*justify-content: center;*/
    }

    .sub-navbar-container {
        max-width: 1100px;
        width: 100%;
        padding: 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        flex-wrap: wrap;
    }

    .sub-nav-link {
        position: relative;
        color: #6B7280;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        padding: 0.75rem 0;
        transition: color 0.3s ease;
        white-space: nowrap;
    }

    .sub-nav-link:hover {
        color: #149B7E;
    }

    .sub-nav-link.active {
        color: #149B7E;
        font-weight: 600;
    }

    .sub-nav-link.active::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 0;
        right: 0;
        height: 3px;
        background-color: #149B7E;
        border-radius: 3px 3px 0 0;
    }

    /* ── Breadcrumb (Migas de Pan) ── */
    .breadcrumb-viaje {
        font-size: 0.75rem;
        margin-bottom: 0.2rem;
        color: #9CA3AF;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .breadcrumb-item {
        color: #149B7E;
        font-weight: 600;
        text-decoration: none;
    }

    .breadcrumb-current {
        color: #1e293b;
        font-weight: 700;
    }

    .integrantes-badge {
        background-color: #EBFBFA;
        color: #149B7E;
        border-radius: 999px;
        padding: 0.15rem 0.5rem;
        font-size: 0.75rem;
        font-weight: 600;
        margin-left: 0.25rem;
    }

    @media (max-width: 768px) {
        .sub-navbar-container {
            gap: 1rem;
            justify-content: flex-start;
            overflow-x: auto;
            padding: 0.5rem 1.5rem;
        }

        .sub-nav-link {
            font-size: 0.8rem;
        }
    }
</style>

<div class="sub-navbar-viaje">
    <nav class="breadcrumb-viaje">
        <a href="{% url 'p_detalle_viaje' viaje.id%}" class="breadcrumb-item">Mis viajes</a> 
        <span>&gt;</span> 
        <span class="breadcrumb-item">{{ viaje.get_estado_display|default:"Planeados" }}</span> 
        <span>&gt;</span> 
        <span class="breadcrumb-current">{{ viaje.nombre }}</span>
    </nav>

    <div class="sub-navbar-container">
        <a href="{% url 'p_detalle_viaje' viaje.id %}" class="sub-nav-link {% if request.resolver_match.url_name == 'p_detalle_viaje' %}active{% endif %}">
            Resumen
        </a>
        <a href="#actividades" class="sub-nav-link {% if request.resolver_match.url_name == 'actividades' %}active{% endif %}">
            Actividades
        </a>
        <a href="#gastos" class="sub-nav-link {% if request.resolver_match.url_name == 'gastos' %}active{% endif %}">
            Gastos
        </a>
        <a href="#chat" class="sub-nav-link {% if request.resolver_match.url_name == 'chat' %}active{% endif %}">
            Chat
        </a>
        <a href="#galeria" class="sub-nav-link {% if request.resolver_match.url_name == 'galeria' %}active{% endif %}">
            Galería
        </a>
        <a href="#" class="sub-nav-link">
            Integrantes <span class="integrantes-badge">{{ viaje.participantes.count }}</span>
        </a>
    </div>
</div>
