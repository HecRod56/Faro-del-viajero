<!-- PRECIO ESTIMADO — bandas fijas de destinos_service.py -->
<p class="filtro-label">Precio estimado</p>

<input type="hidden" name="precio_min" id="at_precio_min" value="{{ precio_min }}">
<input type="hidden" name="precio_max" id="at_precio_max" value="{{ precio_max }}">

<div class="d-flex flex-column gap-1 mb-3">
    <div class="form-check">
        <input class="form-check-input" type="radio" name="_rango_precio_at" id="at_p_todos" value="0,10000" {% if precio_min == 0 and precio_max == 10000 %}checked{% endif %}>
        <label class="form-check-label" for="at_p_todos" style="font-size:13px;color:#374151;">Todos los precios</label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="_rango_precio_at" id="at_p0" value="0,0" {% if precio_min == 0 and precio_max == 0 %}checked{% endif %}>
        <label class="form-check-label" for="at_p0" style="font-size:13px;color:#374151;">🎟️ Gratis</label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="_rango_precio_at" id="at_p1" value="0,150" {% if precio_min == 0 and precio_max == 150 %}checked{% endif %}>
        <label class="form-check-label" for="at_p1" style="font-size:13px;color:#374151;">💚 Económico <span style="color:#94A3B8;font-size:11px;">($50–$150)</span></label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="_rango_precio_at" id="at_p2" value="150,500" {% if precio_min == 150 and precio_max == 500 %}checked{% endif %}>
        <label class="form-check-label" for="at_p2" style="font-size:13px;color:#374151;">💛 Moderado <span style="color:#94A3B8;font-size:11px;">($150–$500)</span></label>
    </div>
    <div class="form-check">
        <input class="form-check-input" type="radio" name="_rango_precio_at" id="at_p3" value="400,1500" {% if precio_min == 400 and precio_max == 1500 %}checked{% endif %}>
        <label class="form-check-label" for="at_p3" style="font-size:13px;color:#374151;">🔴 Premium <span style="color:#94A3B8;font-size:11px;">($400–$1,500)</span></label>
    </div>
</div>

<script>
(function() {
    document.querySelectorAll('input[name="_rango_precio_at"]').forEach(function(radio) {
        radio.addEventListener('change', function() {
            const parts = this.value.split(',');
            document.getElementById('at_precio_min').value = parts[0];
            document.getElementById('at_precio_max').value = parts[1];
        });
    });
})();
</script>
