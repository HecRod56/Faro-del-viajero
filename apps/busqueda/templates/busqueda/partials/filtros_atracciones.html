                    <!-- CATEGORÍA -->
                    <p class="filtro-label">Tipo de Atracción</p>
                    <div class="d-flex flex-column gap-1 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="cultura"
                                id="sub_cultura" {% if 'cultura' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_cultura" style="font-size:13px;color:#374151;">🏛️
                                Cultura</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="naturaleza"
                                id="sub_naturaleza" {% if 'naturaleza' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_naturaleza"
                                style="font-size:13px;color:#374151;">🌿 Naturaleza</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="aventura"
                                id="sub_aventura" {% if 'aventura' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_aventura" style="font-size:13px;color:#374151;">🏃
                                Aventura</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="entretenimiento"
                                id="sub_entretenimiento" {% if 'entretenimiento' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_entretenimiento"
                                style="font-size:13px;color:#374151;">🎭 Entretenimiento</label>
                        </div>
                    </div>

                    <!-- PRECIO ESTIMADO (Rango) -->
                    <p class="filtro-label">Precio estimado</p>
                    
                    <!-- Contenedor del slider con más altura para espacio visual -->
                    <div style="position: relative; width: 100%; margin-bottom: 20px; height: 40px; padding-top: 5px;">
                        <!-- Slider para precio mínimo -->
                        <input type="range" id="slider_precio_min" name="precio_min" min="0" max="10000" step="100"
                            value="{{ precio_min }}" 
                            style="position: absolute; width: 100%; height: 5px; accent-color: #0E9E8E;
                                   pointer-events: none; z-index: {% if precio_min > 5000 %}5{% else %}3{% endif %};
                                   -webkit-appearance: none; appearance: none; background: transparent; top: 5px;">
                        
                        <!-- Slider para precio máximo -->
                        <input type="range" id="slider_precio_max" name="precio_max" min="0" max="10000" step="100"
                            value="{{ precio_max }}" 
                            style="position: absolute; width: 100%; height: 5px; accent-color: #0E9E8E;
                                   pointer-events: none; z-index: 4; 
                                   -webkit-appearance: none; appearance: none; background: transparent; top: 5px;">
                        
                        <style>
                            /* Thumbs para el slider mínimo */
                            #slider_precio_min::-webkit-slider-thumb {
                                -webkit-appearance: none;
                                appearance: none;
                                width: 18px;
                                height: 18px;
                                border-radius: 50%;
                                background: #0E9E8E;
                                cursor: pointer;
                                pointer-events: all;
                                box-shadow: 0 2px 6px rgba(0,0,0,0.15);
                            }
                            #slider_precio_min::-moz-range-thumb {
                                width: 18px;
                                height: 18px;
                                border-radius: 50%;
                                background: #0E9E8E;
                                cursor: pointer;
                                pointer-events: all;
                                border: none;
                                box-shadow: 0 2px 6px rgba(0,0,0,0.15);
                            }
                            
                            /* Thumbs para el slider máximo */
                            #slider_precio_max::-webkit-slider-thumb {
                                -webkit-appearance: none;
                                appearance: none;
                                width: 18px;
                                height: 18px;
                                border-radius: 50%;
                                background: #0E9E8E;
                                cursor: pointer;
                                pointer-events: all;
                                box-shadow: 0 2px 6px rgba(0,0,0,0.15);
                            }
                            #slider_precio_max::-moz-range-thumb {
                                width: 18px;
                                height: 18px;
                                border-radius: 50%;
                                background: #0E9E8E;
                                cursor: pointer;
                                pointer-events: all;
                                border: none;
                                box-shadow: 0 2px 6px rgba(0,0,0,0.15);
                            }
                            
                            /* Track para ambos sliders */
                            #slider_precio_min::-webkit-slider-runnable-track {
                                background: #E5E7EB;
                                height: 5px;
                                border-radius: 5px;
                            }
                            #slider_precio_max::-webkit-slider-runnable-track {
                                background: #E5E7EB;
                                height: 5px;
                                border-radius: 5px;
                            }
                            #slider_precio_min::-moz-range-track {
                                background: #E5E7EB;
                                height: 5px;
                                border-radius: 5px;
                            }
                            #slider_precio_max::-moz-range-track {
                                background: #E5E7EB;
                                height: 5px;
                                border-radius: 5px;
                            }
                            
                            /* Estilos para los inputs de precio */
                            .input-precio {
                                width: 100%;
                                padding: 6px 8px;
                                border: 1px solid #D1D5DB;
                                border-radius: 6px;
                                font-size: 12px;
                                color: #374151;
                                transition: border-color 0.2s;
                            }
                            .input-precio:focus {
                                outline: none;
                                border-color: #0E9E8E;
                                box-shadow: 0 0 0 2px rgba(14, 158, 142, 0.1);
                            }
                        </style>
                    </div>
                    
                    <!-- Labels con valores del slider -->
                    <div class="d-flex justify-content-between"
                        style="font-size:11px;color:#94A3B8;margin-bottom:0.5rem;">
                        <span id="lbl_precio_min">${{ precio_min }} MXN</span>
                        <span id="lbl_precio_max">${{ precio_max }} MXN</span>
                    </div>
                    
                    <!-- Inputs para ingresar montos manualmente -->
                    <div class="d-flex gap-2" style="margin-bottom:1rem;">
                        <div style="flex: 1;">
                            <label style="font-size:10px;color:#94A3B8;display:block;margin-bottom:3px;">Mínimo</label>
                            <input type="number" id="input_precio_min" class="input-precio" 
                                   min="0" max="10000" step="100" value="{{ precio_min }}">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size:10px;color:#94A3B8;display:block;margin-bottom:3px;">Máximo</label>
                            <input type="number" id="input_precio_max" class="input-precio" 
                                   min="0" max="10000" step="100" value="{{ precio_max }}">
                        </div>
                    </div>
                    
                    <script>
                        const sliderMin = document.getElementById('slider_precio_min');
                        const sliderMax = document.getElementById('slider_precio_max');
                        const inputMin = document.getElementById('input_precio_min');
                        const inputMax = document.getElementById('input_precio_max');
                        const lblMin = document.getElementById('lbl_precio_min');
                        const lblMax = document.getElementById('lbl_precio_max');
                        
                        function updateFromSliders() {
                            let minVal = parseInt(sliderMin.value);
                            let maxVal = parseInt(sliderMax.value);
                            
                            // Si el mínimo es mayor que el máximo, intercambiar
                            if (minVal > maxVal) {
                                sliderMin.value = maxVal;
                                minVal = maxVal;
                            }
                            
                            // Actualizar z-index dinámicamente para que el thumb activo esté arriba
                            if (minVal > 5000) {
                                sliderMin.style.zIndex = '5';
                                sliderMax.style.zIndex = '4';
                            } else {
                                sliderMin.style.zIndex = '3';
                                sliderMax.style.zIndex = '4';
                            }
                            
                            // Actualizar labels
                            lblMin.textContent = '$' + Number(minVal).toLocaleString() + ' MXN';
                            lblMax.textContent = '$' + Number(maxVal).toLocaleString() + ' MXN';
                            
                            // Actualizar inputs
                            inputMin.value = minVal;
                            inputMax.value = maxVal;
                        }
                        
                        function updateFromInputs() {
                            let minVal = parseInt(inputMin.value) || 0;
                            let maxVal = parseInt(inputMax.value) || 10000;
                            
                            // Validar rango
                            minVal = Math.max(0, Math.min(minVal, 10000));
                            maxVal = Math.max(0, Math.min(maxVal, 10000));
                            
                            // Si el mínimo es mayor que el máximo, invertir
                            if (minVal > maxVal) {
                                [minVal, maxVal] = [maxVal, minVal];
                            }
                            
                            // Actualizar sliders
                            sliderMin.value = minVal;
                            sliderMax.value = maxVal;
                            
                            // Actualizar labels
                            lblMin.textContent = '$' + Number(minVal).toLocaleString() + ' MXN';
                            lblMax.textContent = '$' + Number(maxVal).toLocaleString() + ' MXN';
                            
                            // Actualizar inputs
                            inputMin.value = minVal;
                            inputMax.value = maxVal;
                            
                            // Actualizar z-index
                            if (minVal > 5000) {
                                sliderMin.style.zIndex = '5';
                                sliderMax.style.zIndex = '4';
                            } else {
                                sliderMin.style.zIndex = '3';
                                sliderMax.style.zIndex = '4';
                            }
                        }
                        
                        // Event listeners para sliders
                        sliderMin.addEventListener('input', updateFromSliders);
                        sliderMax.addEventListener('input', updateFromSliders);
                        
                        // Event listeners para inputs
                        inputMin.addEventListener('change', updateFromInputs);
                        inputMax.addEventListener('change', updateFromInputs);
                        inputMin.addEventListener('keyup', updateFromInputs);
                        inputMax.addEventListener('keyup', updateFromInputs);
                    </script>

                    <!-- POPULARIDAD (badges toggle multi-select) -->
                    <p class="filtro-label">Popularidad</p>
                    <div class="d-flex flex-column gap-2 mb-3">

                        <label style="cursor:pointer;margin:0;">
                            <input type="checkbox" name="popularidad" value="En Tendencia" class="pop-chk"
                                   {% if 'En Tendencia' in popularidades %}checked{% endif %} style="display:none;">
                            <span class="pop-pill" data-on="#0E9E8E" data-off="#0E9E8E20" data-text-on="#fff"
                                  data-text-off="#0E9E8E"
                                  style="display:block;width:100%;text-align:center;padding:5px 10px;border-radius:20px;
                                         font-size:12px;font-weight:600;border:1px solid #0E9E8E40;
                                         background:{% if 'En Tendencia' in popularidades %}#0E9E8E{% else %}#0E9E8E20{% endif %};
                                         color:{% if 'En Tendencia' in popularidades %}#fff{% else %}#0E9E8E{% endif %};">
                                En Tendencia 🔥
                            </span>
                        </label>

                        <label style="cursor:pointer;margin:0;">
                            <input type="checkbox" name="popularidad" value="Ambiente Vivo" class="pop-chk"
                                   {% if 'Ambiente Vivo' in popularidades %}checked{% endif %} style="display:none;">
                            <span class="pop-pill" data-on="#F59E0B" data-off="#F59E0B20" data-text-on="#fff"
                                  data-text-off="#F59E0B"
                                  style="display:block;width:100%;text-align:center;padding:5px 10px;border-radius:20px;
                                         font-size:12px;font-weight:600;border:1px solid #F59E0B40;
                                         background:{% if 'Ambiente Vivo' in popularidades %}#F59E0B{% else %}#F59E0B20{% endif %};
                                         color:{% if 'Ambiente Vivo' in popularidades %}#fff{% else %}#F59E0B{% endif %};">
                                Ambiente Vivo 🍽️
                            </span>
                        </label>

                        <label style="cursor:pointer;margin:0;">
                            <input type="checkbox" name="popularidad" value="Sin filas" class="pop-chk"
                                   {% if 'Sin filas' in popularidades %}checked{% endif %} style="display:none;">
                            <span class="pop-pill" data-on="#6B7280" data-off="#6B728020" data-text-on="#fff"
                                data-text-off="#6B7280" style="display:block;width:100%;text-align:center;padding:5px 10px;border-radius:20px;
                                         font-size:12px;font-weight:600;border:1px solid #6B728040;
                                         background:{% if 'Sin filas' in popularidades %}#6B7280{% else %}#6B728020{% endif %};
                                         color:{% if 'Sin filas' in popularidades %}#fff{% else %}#6B7280{% endif %};">
                                Sin filas 🤙
                            </span>
                        </label>
                    </div>

                    <!-- CUPOS (stepper) -->
                    <p class="filtro-label">Cupos</p>
                    <div class="d-flex align-items-center justify-content-center gap-2 mb-1">
                        <button type="button" id="btn_cupos_menos" onclick="stepCupos(-1)"
                            style="width:28px;height:28px;border-radius:50%;border:1px solid #D1D5DB;
                                       background:white;font-size:18px;line-height:1;cursor:pointer;color:#374151;">−</button>
                        <input type="hidden" id="cupos_input" name="cupos" value="{{ cupos }}">
                        <span id="cupos_display"
                              style="font-weight:700;font-size:16px;color:#1A2E35;min-width:24px;text-align:center;">{{ cupos }}</span>
                        <button type="button" id="btn_cupos_mas" onclick="stepCupos(1)" data-max="{{ num_integrantes }}"
                            style="width:28px;height:28px;border-radius:50%;border:none;
                                       background:#0E9E8E;font-size:18px;line-height:1;cursor:pointer;color:white;">+</button>
                    </div>
                    <p style="font-size:10px;color:#94A3B8;text-align:center;margin-bottom:1rem;">
                        👥 {{ num_integrantes }} integrante{{ num_integrantes|pluralize }} en el viaje
                    </p>
