<!-- CATEGORÍA GASTRONOMÍA -->
                    <p class="filtro-label">Tipo de Establecimiento</p>
                    <div class="d-flex flex-column gap-1 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="restaurantes"
                                id="sub_restaurantes" {% if 'restaurantes' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_restaurantes" style="font-size:13px;color:#374151;">🍽️
                                Restaurantes</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="cafes"
                                id="sub_cafes" {% if 'cafes' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_cafes"
                                style="font-size:13px;color:#374151;">☕ Cafés & Postres</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="bares"
                                id="sub_bares" {% if 'bares' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_bares" style="font-size:13px;color:#374151;">🍻
                                Bares & Pubs</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="subcategoria" value="comida_rapida"
                                id="sub_comida_rapida" {% if 'comida_rapida' in subcategorias %}checked{% endif %}>
                            <label class="form-check-label" for="sub_comida_rapida"
                                style="font-size:13px;color:#374151;">🍔 Comida Rápida</label>
                        </div>
                    </div>

                    <!-- PRECIO ESTIMADO — bandas fijas de obtener_rango_precio_gastronomia() -->
                    <p class="filtro-label">Precio estimado por persona</p>

                    <input type="hidden" name="precio_min" id="g_precio_min" value="{{ precio_min }}">
                    <input type="hidden" name="precio_max" id="g_precio_max" value="{{ precio_max }}">

                    <div class="d-flex flex-column gap-1 mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="_rango_precio_g" id="g_p_todos" value="0,10000" {% if precio_min == 0 and precio_max == 10000 %}checked{% endif %}>
                            <label class="form-check-label" for="g_p_todos" style="font-size:13px;color:#374151;">Todos los precios</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="_rango_precio_g" id="g_p0" value="0,150" {% if precio_min == 0 and precio_max == 150 %}checked{% endif %}>
                            <label class="form-check-label" for="g_p0" style="font-size:13px;color:#374151;">💚 Económico <span style="color:#94A3B8;font-size:11px;">(hasta $150)</span></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="_rango_precio_g" id="g_p1" value="150,700" {% if precio_min == 150 and precio_max == 700 %}checked{% endif %}>
                            <label class="form-check-label" for="g_p1" style="font-size:13px;color:#374151;">💛 Moderado <span style="color:#94A3B8;font-size:11px;">($150–$700)</span></label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="_rango_precio_g" id="g_p2" value="700,10000" {% if precio_min == 700 and precio_max == 10000 %}checked{% endif %}>
                            <label class="form-check-label" for="g_p2" style="font-size:13px;color:#374151;">🔴 Premium <span style="color:#94A3B8;font-size:11px;">($700+)</span></label>
                        </div>
                    </div>

                    <script>
                    (function() {
                        document.querySelectorAll('input[name="_rango_precio_g"]').forEach(function(radio) {
                            radio.addEventListener('change', function() {
                                const parts = this.value.split(',');
                                document.getElementById('g_precio_min').value = parts[0];
                                document.getElementById('g_precio_max').value = parts[1];
                            });
                        });
                    })();
                    </script>
