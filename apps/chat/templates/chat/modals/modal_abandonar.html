<div id="modalAbandonar" class="d-none position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="background:rgba(0,0,0,.5);z-index:99;">
    <div class="bg-white rounded-4 p-4 shadow-lg" style="max-width:340px;width:90%;">
        <h5 class="fw-bold mb-2" style="color:#1A2E35;">¿Abandonar chat?</h5>
        <p class="text-muted mb-4" style="font-size:14px;">Si abandonas el chat ya no podrás ver los mensajes de este viaje.</p>
        <div class="d-flex gap-3 justify-content-end">
            <button onclick="document.getElementById('modalAbandonar').classList.add('d-none')"
                    class="btn rounded-pill px-4" style="border:2px solid #D1D5DB;color:#4B5563;font-weight:700;">
                Cancelar
            </button>
            <form method="POST" action="{% url 'chat:abandonar_viaje' viaje_actual.id %}">
                {% csrf_token %}
                <button type="submit" class="btn rounded-pill px-4" style="background:#EF4444;color:white;font-weight:700;">
                    Sí, abandonar
                </button>
            </form>
        </div>
    </div>
</div>
