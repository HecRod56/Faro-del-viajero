{% extends "core/base.html" %}

{% block content %}

<main class="container-fluid px-4 py-5">
    <div style="max-width:500px;margin:0 auto;">
        <div class="text-center p-5 rounded-4 shadow-sm bg-white border">
            <div class="mb-4" style="font-size:60px;">🚪</div>
            <h4 class="fw-bold mb-2" style="color:#1A2E35;">Ya no formas parte de este chat</h4>
            <p class="text-muted mb-4">Abandonaste el chat de <strong>{{ viaje.nombre }}</strong>. Si crees que es un error, contacta al organizador del viaje.</p>
            <a href="{% url 'gestion_viajes:p_ver_mis_viajes' %}" 
               class="btn rounded-pill px-4 py-2 text-white fw-bold"
               style="background:#149B7E;">
                Volver a Mis Viajes
            </a>
        </div>
    </div>
</main>
{% endblock %}
