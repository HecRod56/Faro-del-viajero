{% extends "core/base.html" %}

<!-- CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

{% block content %}
<div class="container py-4">

    <div class="row g-4">
        
        <!-- Panel izquierdo -->
        <div class="col-md-5">
            <div class="bg-light rounded-4 d-flex justify-content-center align-items-center" style="height: 350px;">
                <div class="rounded-circle bg-success" style="width: 180px; height: 180px;"></div>
            </div>
        </div>

        <!-- Panel derecho -->
        <div class="col-md-7">
            
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="fw-bold">Información:</h4>
                <button class="btn btn-success rounded-pill px-4" onclick="window.history.back()">
                    Volver
                </button>
            </div>

            <!-- Card -->
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body">
                    <p class="text-muted">
                        Aquí puedes mostrar la información principal del elemento seleccionado.
                    </p>

                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#miModal">
                        Abrir modal
                    </button>
                </div>
            </div>

        </div>
    </div>

</div>

<!-- Modal Bootstrap -->
<div class="modal fade" id="miModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">

            <div class="modal-header border-0">
                <h5 class="modal-title">Detalle</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <p>Contenido del modal.</p>
            </div>

        </div>
    </div>
</div>

{% endblock %}
