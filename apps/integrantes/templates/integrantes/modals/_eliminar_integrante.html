<!-- Modal: Eliminar integrante -->
<div class="modal fade" id="modalEliminarIntegrante" tabindex="-1" aria-labelledby="modalEliminarLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="modalEliminarLabel">
          <i class="bi bi-exclamation-triangle-fill text-danger me-2"></i>
          Eliminar integrante
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body pt-2">
        <p class="mb-0">
          ¿Estás seguro de que deseas eliminar a
          <strong id="modalNombreIntegrante"></strong>
          del viaje? Esta acción no se puede deshacer.
        </p>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">
          Cancelar
        </button>
        <form id="formEliminarIntegrante" method="POST" action="">
          {% csrf_token %}
          <input type="hidden" name="id_viaje" value="{{ viaje.id }}" />
          <input type="hidden" name="usuario_actual_id" value="{{ usuario_actual_id }}" />
          <button type="submit" class="btn btn-danger rounded-pill px-4">
            <i class="bi bi-trash-fill me-1"></i> Eliminar
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
